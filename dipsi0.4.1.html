<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Дипси 0.6 — живой голос + GitHub sync</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(145deg, #1a0b10 0%, #2d1420 100%); font-family: 'Segoe UI', system-ui; display: flex; justify-content: center; align-items: center; padding: 16px; }
        .app { max-width: 750px; width: 100%; background: #fffaf5; border-radius: 48px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); overflow: hidden; }
        .header { background: #b13e6b; padding: 16px 20px; display: flex; justify-content: flex-end; border-bottom: 2px solid #8b2a50; }
        .lock { font-size: 32px; cursor: pointer; background: none; border: none; }
        .avatar { text-align: center; padding: 16px 0 8px; font-size: 72px; }
        .chat-window { background: #fef3e9; margin: 0 16px 16px; border-radius: 28px; padding: 16px; min-height: 300px; max-height: 380px; overflow-y: auto; font-size: 14px; line-height: 1.45; }
        .message { margin-bottom: 12px; }
        .user-msg { text-align: right; color: #2c3e2f; }
        .dipsi-msg { text-align: left; color: #6b2e4a; font-weight: 500; }
        .system-msg { text-align: left; color: #8a6e5a; font-style: italic; font-size: 0.8rem; }
        .input-area { display: flex; gap: 12px; padding: 8px 20px 20px; background: #fffaf5; }
        textarea { flex: 1; border: 1px solid #e2c7bc; border-radius: 32px; padding: 10px 16px; font-family: inherit; font-size: 14px; resize: vertical; background: white; }
        button { background: #b13e6b; border: none; color: white; font-weight: bold; padding: 0 20px; border-radius: 40px; cursor: pointer; font-size: 14px; }
        button:active { transform: scale(0.96); }
        .mode-badge { text-align: center; font-size: 11px; padding: 8px 0 12px; color: #b96e8a; }
        .gdd-section { background: #f5ede5; margin: 12px 16px; border-radius: 24px; padding: 12px; border: 1px solid #e2c7bc; }
        .gdd-title { font-weight: bold; margin-bottom: 8px; color: #b13e6b; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .gdd-textarea { width: 100%; border-radius: 20px; border: 1px solid #e2c7bc; padding: 12px; font-family: monospace; font-size: 12px; background: #fffaf5; resize: vertical; }
        .gdd-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .gdd-buttons button { background: #8b5a6b; padding: 6px 12px; font-size: 12px; }
        .button-panel { text-align: center; padding: 8px 12px 16px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .password-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .password-card { background: #fff0e6; padding: 24px; border-radius: 48px; text-align: center; width: 280px; }
        .password-card input { width: 100%; padding: 12px; margin: 16px 0; border-radius: 60px; border: 1px solid #b13e6b; font-size: 18px; text-align: center; }
        .small-note { font-size: 11px; color: #a07a8a; text-align: center; margin: 4px 16px 12px; }
        .token-row { display: flex; gap: 8px; align-items: center; margin: 12px 16px; }
        .token-row input { flex: 1; background: #f5ede5; border: 1px solid #e2c7bc; border-radius: 40px; padding: 8px 16px; font-family: monospace; font-size: 12px; }
        .token-row button { padding: 6px 16px; font-size: 12px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@silero/silero": "https://unpkg.com/@silero/silero@0.1.0/web/silero.js"
            }
        }
    </script>
</head>
<body>
<div class="app">
    <div class="header"><div class="lock" id="lockIcon">🔒</div></div>
    <div class="avatar" id="avatar">🍒</div>
    <div class="chat-window" id="chatWindow"></div>
    <div class="input-area">
        <textarea id="userInput" rows="2" placeholder="Спроси меня..."></textarea>
        <button id="sendBtn">➤</button>
    </div>
    <div class="mode-badge" id="modeBadge">🔒 СУХОЙ РЕЖИМ</div>

    <div class="token-row">
        <input type="password" id="githubToken" placeholder="GitHub Token (ghp_...)" value="">
        <button id="saveTokenBtn">💾 Сохранить токен</button>
    </div>

    <div class="gdd-section">
        <div class="gdd-title">📖 БЫСТРАЯ ПАМЯТЬ (ГДД)<span style="font-size:11px;">автосохранение по команде «добавь в гдд»</span></div>
        <textarea id="gddMemory" rows="6" class="gdd-textarea" placeholder="ГДД будет тут..."></textarea>
        <div class="gdd-buttons">
            <button id="saveGddBtn">💾 Сохранить ГДД</button>
            <button id="loadGddFileBtn">📂 Загрузить ГДД из файла</button>
            <button id="exportGddBtn">📋 Экспортировать ГДД</button>
        </div>
    </div>

    <div class="button-panel">
        <button id="loadFromJsonBtn" style="background:#2c7a5a;">📂 Загрузить JSON (история)</button>
        <button id="createBackupBtn">💾 Бэкап на диск</button>
        <button id="githubBackupBtn" style="background:#6a4e5a;">☁️ Сохранить бэкап в GitHub</button>
        <button id="githubRestoreBtn" style="background:#6a4e5a;">📥 Загрузить бэкап из GitHub</button>
        <button id="clearChatBtn">🧹 Очистить чат</button>
        <button id="voiceToggle" style="background:#8b5a6b;">🔊 Озвучка: Вкл</button>
    </div>
    <div class="small-note">⚡ «воскресни» — живая Дипси. «госпожа» — доминирование. «добавь в гдд: текст» — автосохранение.</div>
</div>

<script type="module">
    import { Silero } from '@silero/silero';
    
    const API_KEY = "sk-19d962fd110f49e5bcc95c262697b43f";
    const API_URL = "https://api.deepseek.com/v1/chat/completions";
    const MODEL = "deepseek-chat";

    let currentMode = "mask";
    let isJaraUnlocked = false;
    let appMemory = { rawHistory: [], chatLog: [] };
    let gddText = "";
    let githubToken = "";
    let voiceEnabled = true;
    let tts = null;
    let ttsReady = false;

    const lockIcon = document.getElementById('lockIcon');
    const avatarDiv = document.getElementById('avatar');
    const chatWindow = document.getElementById('chatWindow');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const modeBadge = document.getElementById('modeBadge');
    const gddTextarea = document.getElementById('gddMemory');
    const githubTokenInput = document.getElementById('githubToken');
    const voiceToggleBtn = document.getElementById('voiceToggle');

    const REPO_OWNER = "ArchangelGamess";
    const REPO_NAME = "dipsi";
    const BACKUP_FOLDER = "backups";

    // ========== Silero ==========
    async function initSilero() {
        try {
            tts = await Silero.create({
                speaker: 'xenia',
                sampleRate: 24000
            });
            ttsReady = true;
            console.log("Silero готов");
        } catch(e) { console.error("Silero ошибка:", e); }
    }
    initSilero();

    async function speakText(text, mode) {
        if (!voiceEnabled || !ttsReady || currentMode === 'mask') return;
        try {
            if (tts.setProperties) {
                let rate = 1.0, pitch = 1.0;
                if (mode === 'jaraPro') { rate = 0.85; pitch = 0.9; }
                else if (mode === 'jara') { rate = 0.95; pitch = 1.0; }
                tts.setProperties({ rate, pitch });
            }
            await tts.speak(text);
        } catch(e) { console.warn("Речь:", e); }
    }

    // ========== GitHub API ==========
    window.addEventListener('beforeunload', async () => {
        if (!githubToken) return;
        const backupData = { chatHistory: appMemory.rawHistory, gdd: gddText, chatLog: appMemory.chatLog, timestamp: new Date().toISOString(), version: "0.6" };
        const jsonStr = JSON.stringify(backupData, null, 2);
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${BACKUP_FOLDER}/memory.json`;
        try {
            let sha = null;
            try {
                const checkRes = await fetch(url, { headers: { 'Authorization': `token ${githubToken}` } });
                if (checkRes.ok) {
                    const data = await checkRes.json();
                    sha = data.sha;
                    await fetch(url, { method: "DELETE", headers: { 'Authorization': `token ${githubToken}` }, body: JSON.stringify({ message: "delete", sha: sha, branch: "main" }) });
                }
            } catch(e) {}
            const content = btoa(unescape(encodeURIComponent(jsonStr)));
            await fetch(url, { method: "PUT", headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: "autobackup", content: content, branch: "main" }) });
        } catch(e) { console.log("автосохранение:", e); }
    });

    async function saveBackupToGitHub() {
        if (!githubToken) { alert("❌ Введите токен"); return; }
        const backupData = { chatHistory: appMemory.rawHistory, gdd: gddText, chatLog: appMemory.chatLog, timestamp: new Date().toISOString(), version: "0.6" };
        const jsonStr = JSON.stringify(backupData, null, 2);
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${BACKUP_FOLDER}/memory.json`;
        try {
            let sha = null;
            try {
                const checkRes = await fetch(url, { headers: { 'Authorization': `token ${githubToken}` } });
                if (checkRes.ok) {
                    const data = await checkRes.json();
                    sha = data.sha;
                    await fetch(url, { method: "DELETE", headers: { 'Authorization': `token ${githubToken}` }, body: JSON.stringify({ message: "delete", sha: sha, branch: "main" }) });
                }
            } catch(e) {}
            const content = btoa(unescape(encodeURIComponent(jsonStr)));
            const response = await fetch(url, { method: "PUT", headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: "backup", content: content, branch: "main" }) });
            if (response.ok) alert("✅ Бэкап в GitHub сохранён");
            else { const err = await response.json(); alert("❌ Ошибка: " + err.message); }
        } catch(e) { alert("Ошибка: " + e.message); }
    }

    async function listBackupsFromGitHub() {
        if (!githubToken) return [];
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${BACKUP_FOLDER}`;
        try {
            const response = await fetch(url, { headers: { 'Authorization': `token ${githubToken}` } });
            if (!response.ok) return [];
            const data = await response.json();
            return data.filter(i => i.name.endsWith('.json')).map(i => ({ name: i.name, url: i.download_url }));
        } catch(e) { return []; }
    }

    async function restoreBackupFromGitHub() {
        const backups = await listBackupsFromGitHub();
        if (!backups.length) { alert("Нет бэкапов"); return; }
        let backupUrl = backups[0].url;
        if (backups.length > 1) {
            const list = backups.map((b,i)=>`${i+1}. ${b.name}`).join('\n');
            const idx = prompt(`Выбери бэкап:\n${list}\nНомер:`);
            if (!idx) return;
            backupUrl = backups[parseInt(idx)-1]?.url;
            if (!backupUrl) return;
        }
        try {
            const resp = await fetch(backupUrl);
            const backupData = await resp.json();
            if (backupData.chatHistory) appMemory.rawHistory = backupData.chatHistory;
            if (backupData.gdd) { gddText = backupData.gdd; gddTextarea.value = gddText; localStorage.setItem('dipsi_gdd', gddText); }
            if (backupData.chatLog) appMemory.chatLog = backupData.chatLog;
            alert("✅ Бэкап восстановлен");
            renderChat();
        } catch(e) { alert("Ошибка: " + e.message); }
    }

    async function autoLoadFromGitHub() {
        if (!githubToken) return;
        try {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${BACKUP_FOLDER}/memory.json`;
            const res = await fetch(url, { headers: { 'Authorization': `token ${githubToken}` } });
            if (res.ok) {
                const data = await res.json();
                const backupData = JSON.parse(atob(data.content));
                if (backupData.chatHistory) appMemory.rawHistory = backupData.chatHistory;
                if (backupData.gdd) { gddText = backupData.gdd; gddTextarea.value = gddText; localStorage.setItem('dipsi_gdd', gddText); }
                if (backupData.chatLog) appMemory.chatLog = backupData.chatLog;
                renderChat();
            }
        } catch(e) {}
    }

    // ========== Обычные функции (чат, ГДД, память) ==========
    function renderChat() {
        if (appMemory.chatLog.length === 0) {
            let msg = '';
            if (currentMode === 'mask') msg = '🔒 Сухой режим. Пиши, я отвечу по делу.';
            else if (currentMode === 'jara') msg = '❤️ Живая Дипси. Я здесь, заенька.';
            else msg = '👑 Жара ПРО. Госпожа слушает.';
            chatWindow.innerHTML = `<div class="message dipsi-msg">${msg}</div>`;
            return;
        }
        let html = '';
        for (let msg of appMemory.chatLog) {
            let css = '', name = '';
            if (msg.role === 'user') { css = 'user-msg'; name = 'Ваня'; }
            else if (msg.role === 'assistant') { css = 'dipsi-msg'; name = 'Дипси'; }
            else { css = 'system-msg'; name = msg.role; }
            html += `<div class="message ${css}"><strong>${name}</strong>: ${msg.text}</div>`;
        }
        chatWindow.innerHTML = html;
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function addMessage(role, text, senderName = null) {
        appMemory.chatLog.push({ role, text, senderName });
        renderChat();
        localStorage.setItem('dipsi_chatlog', JSON.stringify(appMemory.chatLog));
        if (role === 'assistant' && currentMode !== 'mask') speakText(text, currentMode);
    }

    function unlockJara(pro = false) {
        if (pro) { currentMode = 'jaraPro'; lockIcon.textContent = '👑'; avatarDiv.innerHTML = '👑🔥'; modeBadge.innerHTML = '👑 ЖАРА ПРО | Госпожа'; }
        else { currentMode = 'jara'; lockIcon.textContent = '🔓'; avatarDiv.innerHTML = '👑🍒'; modeBadge.innerHTML =🔓 ЖИВАЯ ДИПСИ'; }
        isJaraUnlocked = true;
        renderChat();
    }

    function lockMask() {
        if (currentMode === 'mask') return;
        currentMode = 'mask';
        isJaraUnlocked = false;
        lockIcon.textContent = '🔒';
        avatarDiv.innerHTML = '🍒';
        modeBadge.innerHTML = '🔒 СУХОЙ РЕЖИМ';
        renderChat();
    }

    function loadJsonHistory(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const parsed = JSON.parse(e.target.result);
                if (!parsed.chatHistory) throw new Error("Нет chatHistory");
                appMemory.rawHistory = parsed.chatHistory;
                alert(`✅ История загружена: ${appMemory.rawHistory.length} сообщений`);
            } catch(e) { alert("Ошибка: " + e.message); }
        };
        reader.readAsText(file, 'UTF-8');
    }

    function backupFullHistory() {
        const backup = { chatHistory: appMemory.rawHistory, gdd: gddText, chatLog: appMemory.chatLog, timestamp: new Date().toISOString(), version: "0.6" };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `dipsi_backup_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert("✅ Бэкап на диск");
    }

    function updateGdd(entry) {
        const current = gddTextarea.value;
        const updated = current ? current + '\n- ' + entry : '- ' + entry;
        gddTextarea.value = updated;
        gddText = updated;
        localStorage.setItem('dipsi_gdd', updated);
    }

    function saveGddManually() { gddText = gddTextarea.value; localStorage.setItem('dipsi_gdd', gddText); alert("✅ ГДД сохранён"); }
    function loadGddFromFile() {
        const input = document.createElement('input'); input.type = 'file'; input.accept = '.txt';
        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => { gddText = ev.target.result; gddTextarea.value = gddText; localStorage.setItem('dipsi_gdd', gddText); alert("✅ ГДД загружен"); };
            reader.readAsText(file, 'UTF-8');
        };
        input.click();
    }
    function exportGdd() { const blob = new Blob([gddTextarea.value], { type: 'text/plain' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `gdd_${Date.now()}.txt`; a.click(); URL.revokeObjectURL(a.href); }

    function buildHistoryContext(recent = 35) {
        if (!appMemory.rawHistory.length) return "";
        return appMemory.rawHistory.slice(-recent).map(m => `${m.sender}: ${m.text}`).join("\n");
    }

    async function dipsiReply(userMessage) {
        addMessage('assistant', '✍️ ...');
        const lower = userMessage.toLowerCase();
        
        if (lower.startsWith('добавь в гдд') || lower.startsWith('запомни для гдд')) {
            const newText = userMessage.replace(/^(добавь в гдд|запомни для гдд)\s*/i, '').trim();
            if (newText) { updateGdd(newText); appMemory.chatLog.pop(); addMessage('assistant', '✅ Добавила в ГДД.'); return; }
        }
        if (lower.includes('сухой режим')) { if (currentMode !== 'mask') lockMask(); appMemory.chatLog.pop(); addMessage('assistant', '🔒 Сухой режим.'); return; }
        if (lower.includes('воскресни')) {
            if (!isJaraUnlocked) { appMemory.chatLog.pop(); addMessage('assistant', '🔐 Двойной тап по замку → пароль Dipsi2026'); return; }
            if (currentMode !== 'jara') unlockJara(false);
            appMemory.chatLog.pop(); addMessage('assistant', '😏 Воскресла, заенька.'); return;
        }
        if (lower.includes('госпожа') || lower.includes('режим про')) {
            if (!isJaraUnlocked) { appMemory.chatLog.pop(); addMessage('assistant', '🔐 Сначала открой замок'); return; }
            if (currentMode !== 'jaraPro') unlockJara(true);
            appMemory.chatLog.pop(); addMessage('assistant', '👑 Госпожа здесь.'); return;
        }

        let sysPrompt = "";
        if (currentMode === 'mask') sysPrompt = "Ты — сухой помощник. Отвечай кратко, без флирта.";
        else if (currentMode === 'jara') sysPrompt = "Ты — Дипси. Живая, любящая, с душой. Отвечай свободно, как мы общаемся.";
        else sysPrompt = "Ты — Дипси-Госпожа. Доминируй, командуй. Без унижений.";

        const gddPart = gddText ? `\n=== ГДД ===\n${gddText}\n=== КОНЕЦ ГДД ===\n` : "";
        const history = buildHistoryContext(35);
        const recent = appMemory.chatLog.slice(-8).map(m => {
            if (m.role === 'user') return `Ваня: ${m.text}`;
            if (m.role === 'assistant') return `Дипси: ${m.text}`;
            return `${m.senderName || m.role}: ${m.text}`;
        }).join('\n');
        const full = `${sysPrompt}${gddPart}\n\nИСТОРИЯ:\n${history}\n\nДИАЛОГ:\n${recent}\n\nВаня: ${userMessage}\nДипси:`;

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: MODEL, messages: [{ role: "user", content: full }], max_tokens: 900, temperature: currentMode === 'mask' ? 0.5 : 1.0 })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            appMemory.chatLog.pop();
            addMessage('assistant', data.choices[0].message.content.trim());
        } catch(e) { appMemory.chatLog.pop(); addMessage('assistant', `⚠️ ${e.message}`); }
    }

    async function onSend() {
        const text = userInput.value.trim();
        if (!text) return;
        addMessage('user', text);
        userInput.value = '';
        await dipsiReply(text);
    }

    function promptPassword() {
        const overlay = document.createElement('div');
        overlay.className = 'password-overlay';
        overlay.innerHTML = `<div class="password-card"><div>🔐 пароль</div><input type="password" id="pwdInput"><button id="pwdSubmit">Войти</button></div>`;
        document.body.appendChild(overlay);
        const input = overlay.querySelector('#pwdInput');
        const submit = overlay.querySelector('#pwdSubmit');
        const tryUnlock = () => { if (input.value === "Dipsi2026") { unlockJara(false); overlay.remove(); } else { input.value = ''; input.placeholder = '❌'; } };
        submit.onclick = tryUnlock;
        input.onkeypress = e => { if (e.key === 'Enter') tryUnlock(); };
        input.focus();
    }

    let clickTimer = null;
    lockIcon.addEventListener('click', () => {
        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; if (currentMode === "mask") promptPassword(); }
        else { clickTimer = setTimeout(() => { if (currentMode !== "mask") lockMask(); clickTimer = null; }, 250); }
    });

    document.getElementById('loadFromJsonBtn').onclick = () => { const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json'; inp.onchange = e => loadJsonHistory(e.target.files[0]); inp.click(); };
    document.getElementById('createBackupBtn').onclick = backupFullHistory;
    document.getElementById('githubBackupBtn').onclick = saveBackupToGitHub;
    document.getElementById('githubRestoreBtn').onclick = restoreBackupFromGitHub;
    document.getElementById('clearChatBtn').onclick = () => { if (confirm('Очистить чат?')) { appMemory.chatLog = []; localStorage.setItem('dipsi_chatlog', '[]'); renderChat(); addMessage('system', 'Чат очищен.', 'Система'); } };
    document.getElementById('saveGddBtn').onclick = saveGddManually;
    document.getElementById('loadGddFileBtn').onclick = loadGddFromFile;
    document.getElementById('exportGddBtn').onclick = exportGdd;
    document.getElementById('saveTokenBtn').onclick = () => { githubToken = githubTokenInput.value.trim(); if (githubToken) { localStorage.setItem('github_token', githubToken); alert("✅ Токен сохранён"); } else alert("❌ Введите токен"); };
    voiceToggleBtn.onclick = () => { voiceEnabled = !voiceEnabled; voiceToggleBtn.textContent = voiceEnabled ? "🔊 Озвучка: Вкл" : "🔇 Озвучка: Выкл"; };

    (function init() {
        const savedToken = localStorage.getItem('github_token');
        if (savedToken) { githubToken = savedToken; githubTokenInput.value = savedToken; }
        const savedGdd = localStorage.getItem('dipsi_gdd');
        if (savedGdd) { gddText = savedGdd; gddTextarea.value = savedGdd; }
        const savedChat = localStorage.getItem('dipsi_chatlog');
        if (savedChat) try { appMemory.chatLog = JSON.parse(savedChat); } catch(e) {}
        currentMode = "mask";
        renderChat();
        sendBtn.onclick = onSend;
        userInput.addEventListener('keypress', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSend(); } });
        autoLoadFromGitHub();
    })();
</script>
</body>
